# MERIDIAN CI — Phase 0 item P0.3.
#
# STATUS: RUNNING ON HOSTED CI.
# The backend job first executed on GitHub Actions on 2026-07-20 (run 29741326030, success). The
# frontend job below is added in the same spirit and is not a hosted result until it has run.
# The rule that produced the original wording still stands: no document may claim a check is
# "guarded in CI" until that specific job has passed hosted. See docs/delivery/CAPABILITY-CLAIMS.md C9.
#
# DESIGN PRINCIPLE: this workflow runs ONLY checks that genuinely exist and genuinely pass. It
# deliberately contains no OS matrix, no multi-version matrix, no coverage gate, no performance
# gate, no linter, no formatter, no Docker build, no deployment and no live model call. Every one
# of those would either fail immediately or assert a standard the project has not adopted.
# Adding any of them is a separate, deliberate decision.
#
# PLATFORM HONESTY: the local verification that this workflow reproduces was performed on
# Windows 10 (build 19045) with CPython 3.12.10. GitHub's `windows-latest` is Windows Server,
# NOT Windows 10, so a hosted run is a genuinely different environment and may behave
# differently — in particular its long-path configuration may differ, which is the exact issue
# the mesa `--no-deps` install works around. That difference is why the local result may not be
# claimed as a hosted result.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend — install, smoke, tests
    runs-on: windows-latest
    defaults:
      run:
        working-directory: scaffold/backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12.10
        uses: actions/setup-python@v5
        with:
          # Pinned to the exact version verified locally on 19 July 2026.
          # No version matrix: nothing else has been tested, so nothing else may be claimed.
          python-version: '3.12.10'

      - name: Show environment
        run: |
          python --version
          python -c "import platform; print(platform.system(), platform.release())"
          python -m pip --version

      # Step 1 of the documented two-command install (scaffold/README.md).
      - name: Install core requirements
        run: python -m pip install -r requirements.txt

      # Step 2. --no-deps is REQUIRED, not an optimisation: mesa's declared visualisation
      # dependencies pull a solara/Jupyter tree whose paths break the install. See
      # requirements-mesa.txt for the full reasoning and the reproduction.
      - name: Install mesa (--no-deps, recorded exception)
        run: python -m pip install --no-deps -r requirements-mesa.txt

      # Reports the packaging exception explicitly rather than hiding it. Passes only if the
      # ONLY inconsistencies are the four recorded mesa visualisation packages; fails on anything
      # else. Does not claim the environment is dependency-consistent, because it is not.
      - name: Packaging check (pip check, with recorded exception)
        run: python tools/ci_pip_check.py

      # Imports every third-party module and every MERIDIAN module, and verifies the specific
      # mesa APIs the codebase subclasses — not merely that `import mesa` succeeds.
      - name: Import smoke test
        env:
          PYTHONPATH: ${{ github.workspace }}/scaffold/backend
        run: python tools/ci_smoke.py

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}/scaffold/backend
        run: python -m pytest tests -v

      # Preserve useful failure output. `pip freeze` makes a failed run diagnosable: every
      # requirement is an open-ended range with no lockfile, so two runs on different days can
      # resolve to different versions, and the resolved set is the first thing to check.
      - name: Record resolved dependency versions
        if: always()
        run: python -m pip freeze

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-diagnostics
          path: |
            scaffold/backend/.pytest_cache/
          if-no-files-found: ignore
          retention-days: 7

  # ── FRONTEND ─────────────────────────────────────────────────────────────────────────────────
  #
  # Independent of the backend job: no `needs:`, so the two run concurrently and a backend failure
  # never hides a frontend failure. Runs on ubuntu-latest because nothing here is OS-specific —
  # the backend's windows-latest pin exists for the mesa long-path workaround, which has no
  # frontend equivalent.
  #
  # CLEAN-INSTALL EVIDENCE. `npm ci` is used, not `npm install`: it installs exactly the committed
  # package-lock.json, refuses to silently update it, and deletes any pre-existing node_modules
  # first. It fails outright if package.json and the lockfile disagree, which is the property that
  # makes this a real check rather than a re-run of whatever happened to be on a laptop.
  #
  # The npm cache below caches the DOWNLOAD cache only, never node_modules, so every run still
  # performs a full clean install from the lockfile. Caching node_modules would destroy exactly
  # the evidence this job exists to produce.
  frontend:
    name: Frontend — install, build, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scaffold/frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: scaffold/frontend/package-lock.json

      - name: Show environment
        run: |
          node --version
          npm --version

      # `playwright` is a devDependency used only by scripts/screenshot.mjs, which this job does
      # not run. Skipping the browser download keeps the install bounded; a missing browser binary
      # cannot affect the build or the test suite.
      - name: Install dependencies from the committed lockfile
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: npm ci

      # Proves the lockfile was honoured. `npm ci` already fails on a mismatch; this makes the
      # fact visible in the log rather than implied by the absence of an error.
      - name: Confirm the lockfile was not modified by the install
        run: git diff --exit-code -- package-lock.json package.json

      # `npm run build` is `tsc --noEmit && vite build`, so this is a type check and a production
      # build in one step. A type error fails the job before the bundle is attempted.
      - name: Production build
        run: npm run build

      - name: Confirm the build produced no tracked artefacts
        run: git status --porcelain --untracked-files=no -- . | tee /dev/stderr | wc -l | grep -qx 0

      - name: Run tests
        run: npm test

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-failure-diagnostics
          path: |
            scaffold/frontend/dist/
          if-no-files-found: ignore
          retention-days: 7
